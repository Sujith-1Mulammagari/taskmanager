# ============================================================
# NGINX CONFIGURATION
# ============================================================
# Nginx acts as a REVERSE PROXY and STATIC FILE SERVER
#
# WHAT IS A REVERSE PROXY?
#   Client → Nginx → Backend Server
#   
#   Nginx sits in front and:
#   1. Serves static files (HTML, CSS, JS) directly
#   2. Forwards API requests to Spring Boot
#   
# WHY use Nginx instead of serving React directly?
#   - Nginx is MUCH faster at serving static files
#   - Can handle thousands of concurrent connections
#   - Built-in gzip compression (smaller file transfers)
#   - SSL termination (handles HTTPS)
# ============================================================

server {
    listen 80;
    server_name localhost;
    
    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # REACT ROUTER FIX
    # ============================================================
    # React uses client-side routing (React Router)
    # If user refreshes on /tasks/5, Nginx would look for /tasks/5 file
    # (which doesn't exist) and return 404
    # 
    # try_files: try serving the exact file, if not found, serve index.html
    # React Router then handles the /tasks/5 route on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # API PROXY - forward /api/* requests to Spring Boot
    # ============================================================
    # When React calls /api/tasks, Nginx forwards to http://backend:8080/api/tasks
    # 'backend' is the Docker service name (from docker-compose.yml)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # GZIP COMPRESSION - reduces file sizes
    # ============================================================
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
