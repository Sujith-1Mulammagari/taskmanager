# ============================================
# APPLICATION PROPERTIES - Spring Boot Config
# ============================================

# Server port - your app runs on port 8080
server.port=8080

# ============================================
# DATABASE CONFIGURATION
# ============================================
# spring.datasource = tells Spring Boot how to connect to your DB
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=taskmanager
spring.datasource.password=Sujith@2806

# MySQL Driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# ddl-auto=update means Hibernate will CREATE/UPDATE tables automatically
# In production, use 'validate' or 'none'
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

# Makes SQL output readable with indentation
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect - tells Hibernate to generate MySQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# CORS CONFIGURATION
# ============================================
# This allows React (running on port 3000) to talk to Spring Boot (port 8080)
spring.web.cors.allowed-origins=http://localhost:3000
